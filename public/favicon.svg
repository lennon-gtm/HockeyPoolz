<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>HockeyPoolz</title>
  <defs>
    <!-- Orb core: centered radial gradient per Signyl orb spec -->
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#faf0dc"/>
      <stop offset="18%"  stop-color="#e8c47a"/>
      <stop offset="38%"  stop-color="#c8a060"/>
      <stop offset="62%"  stop-color="#7a5020"/>
      <stop offset="82%"  stop-color="#3d2a10"/>
      <stop offset="100%" stop-color="#1a1612"/>
    </radialGradient>
    <!-- Ember halo: soft glow emanating from orb center outward -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="25%"  stop-color="#c8a060" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#c8a060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: ink, rounded to match app icon convention -->
  <rect width="32" height="32" rx="7" fill="#1a1612"/>

  <!-- Ember halo behind rings -->
  <circle cx="16" cy="16" r="15" fill="url(#halo)"/>

  <!-- Outer ring: rgba(200,160,96,0.2) per orb spec -->
  <circle cx="16" cy="16" r="13.5" fill="none"
          stroke="rgba(200,160,96,0.2)" stroke-width="0.75"/>

  <!-- Inner ring: rgba(200,160,96,0.35) per orb spec, inset ~70px scaled -->
  <circle cx="16" cy="16" r="11" fill="none"
          stroke="rgba(200,160,96,0.35)" stroke-width="0.75"/>

  <!-- Orb core -->
  <circle cx="16" cy="16" r="8.5" fill="url(#orb)"/>
</svg>
